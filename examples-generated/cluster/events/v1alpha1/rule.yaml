apiVersion: events.oci.upbound.io/v1alpha1
kind: Rule
metadata:
  annotations:
    meta.upbound.io/example-id: events/v1alpha1/rule
  labels:
    testing.upbound.io/example-name: test_rule
  name: test-rule
spec:
  forProvider:
    actions:
    - action:
      - actionType: ${var.rule_actions_action_action_type}
        description: ${var.rule_actions_action_description}
        functionIdSelector:
          matchLabels:
            testing.upbound.io/example-name: test_function
        isEnabled: ${var.rule_actions_action_is_enabled}
        streamIdSelector:
          matchLabels:
            testing.upbound.io/example-name: test_stream
        topicIdSelector:
          matchLabels:
            testing.upbound.io/example-name: test_topic
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    conditionDetails:
    - data: ${jsonencode({})}
      eventTypes:
      - com.oraclecloud.objectstorage.createbucket
      - com.oraclecloud.objectstorage.deletebucket
    definedTags:
      Operations.CostCenter: "42"
    description: ${var.rule_description}
    displayName: ${var.rule_display_name}
    freeformTags:
      Department: Finance
    isEnabled: ${var.rule_is_enabled}
