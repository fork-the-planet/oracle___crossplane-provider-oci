apiVersion: ocvp.oci.upbound.io/v1alpha1
kind: ByolAllocation
metadata:
  annotations:
    meta.upbound.io/example-id: ocvp/v1alpha1/byolallocation
  labels:
    testing.upbound.io/example-name: test_byol_allocation
  name: test-byol-allocation
spec:
  forProvider:
    allocatedUnits: ${var.byol_allocation_allocated_units}
    byolIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_byol
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    definedTags:
      Operations.CostCenter: "42"
    displayName: ${var.byol_allocation_display_name}
    freeformTags:
      Department: Finance
