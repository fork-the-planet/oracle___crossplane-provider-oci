apiVersion: osmanagementhub.oci.upbound.io/v1alpha1
kind: ManagedInstanceSwitchSnapChannelManagement
metadata:
  annotations:
    meta.upbound.io/example-id: osmanagementhub/v1alpha1/managedinstanceswitchsnapchannelmanagement
  labels:
    testing.upbound.io/example-name: test_managed_instance_switch_snap_channel_management
  name: test-managed-instance-switch-snap-channel-management
spec:
  forProvider:
    managedInstanceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_managed_instance
    snapDetails:
    - channel: ${var.managed_instance_switch_snap_channel_management_snap_details_channel}
      name: ${var.managed_instance_switch_snap_channel_management_snap_details_name}
    workRequestDetails:
    - description: ${var.managed_instance_switch_snap_channel_management_work_request_details_description}
      displayName: ${var.managed_instance_switch_snap_channel_management_work_request_details_display_name}
