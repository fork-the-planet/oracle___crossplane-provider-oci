apiVersion: osmanagementhub.oci.m.upbound.io/v1alpha1
kind: DynamicSetInstallPackagesManagement
metadata:
  annotations:
    meta.upbound.io/example-id: osmanagementhub/v1alpha1/dynamicsetinstallpackagesmanagement
  labels:
    testing.upbound.io/example-name: test_dynamic_set_install_packages_management
  name: test-dynamic-set-install-packages-management
  namespace: upbound-system
spec:
  forProvider:
    dynamicSetIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_dynamic_set
    managedInstances: ${var.dynamic_set_install_packages_management_managed_instances}
    packageNames: ${var.dynamic_set_install_packages_management_package_names}
    workRequestDetails:
    - description: ${var.dynamic_set_install_packages_management_work_request_details_description}
      displayName: ${var.dynamic_set_install_packages_management_work_request_details_display_name}
