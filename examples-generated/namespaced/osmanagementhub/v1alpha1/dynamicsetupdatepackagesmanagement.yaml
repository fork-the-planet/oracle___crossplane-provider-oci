apiVersion: osmanagementhub.oci.m.upbound.io/v1alpha1
kind: DynamicSetUpdatePackagesManagement
metadata:
  annotations:
    meta.upbound.io/example-id: osmanagementhub/v1alpha1/dynamicsetupdatepackagesmanagement
  labels:
    testing.upbound.io/example-name: test_dynamic_set_update_packages_management
  name: test-dynamic-set-update-packages-management
  namespace: upbound-system
spec:
  forProvider:
    dynamicSetIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_dynamic_set
    managedInstances: ${var.dynamic_set_update_packages_management_managed_instances}
    updateTypes: ${var.dynamic_set_update_packages_management_update_types}
    workRequestDetails:
    - description: ${var.dynamic_set_update_packages_management_work_request_details_description}
      displayName: ${var.dynamic_set_update_packages_management_work_request_details_display_name}
