
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: oci-budget-namespaced-v1alpha1-tests-template
spec:
  serviceAccountName: argo-workflow
  entrypoint: budget-namespaced-tests-workflow
  volumes:
    - name: git-repo
      persistentVolumeClaim:
        claimName: git-repo-pvc
  arguments:
    parameters:
    - name: target_namespace
    - name: compartment_ocid
    - name: tenancy_ocid
    - name: create_resources
      value: "true"
    - name: delete_resources
      value: "true"
  templates:
    - name: budget-namespaced-tests-workflow
      inputs:
        parameters:
          - name: target_namespace
            value: "{{workflow.parameters.target_namespace}}"
      dag:
        tasks:
        - name: create-alertrule
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-budget]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/budget/v1alpha1/alertrule.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-budget
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/budget/v1alpha1/budget.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}},TENANCY_OCID={{workflow.parameters.tenancy_ocid}}"
        - name: delete-alertrule
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-alertrule"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-alertrule.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-alertrule.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-alertrule.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-budget
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-budget", "delete-alertrule"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-budget.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-budget.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-budget.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
