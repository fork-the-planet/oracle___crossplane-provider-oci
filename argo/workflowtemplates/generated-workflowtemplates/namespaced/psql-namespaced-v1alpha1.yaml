
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: oci-psql-namespaced-v1alpha1-tests-template
spec:
  serviceAccountName: argo-workflow
  entrypoint: psql-namespaced-tests-workflow
  volumes:
    - name: git-repo
      persistentVolumeClaim:
        claimName: git-repo-pvc
  arguments:
    parameters:
    - name: target_namespace
    - name: compartment_ocid
    - name: create_compartment
      value: "true"
    - name: create_subnet
      value: "true"
    - name: create_vcn
      value: "true"
    - name: create_resources
      value: "true"
    - name: delete_resources
      value: "true"
  templates:
    - name: psql-namespaced-tests-workflow
      inputs:
        parameters:
          - name: target_namespace
            value: "{{workflow.parameters.target_namespace}}"
      dag:
        tasks:
        - name: create-compartment
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_compartment}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/identity/v1alpha1/compartment.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}}"
        - name: create-privatesubnet
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_subnet}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/privatesubnet.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-vcn
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_vcn}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/vcn.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-psqldbsystem
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-privatesubnet]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/psql/v1alpha1/psqldbsystem.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-psqldbsystem
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-psqldbsystem"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-psqldbsystem.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-psqldbsystem.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-psqldbsystem.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
