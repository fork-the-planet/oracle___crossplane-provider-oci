
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: oci-mediaservices-namespaced-v1alpha1-tests-template
spec:
  serviceAccountName: argo-workflow
  entrypoint: mediaservices-namespaced-tests-workflow
  volumes:
    - name: git-repo
      persistentVolumeClaim:
        claimName: git-repo-pvc
  arguments:
    parameters:
    - name: target_namespace
    - name: compartment_ocid
    - name: create_compartment
      value: "true"
    - name: create_resources
      value: "true"
    - name: delete_resources
      value: "true"
  templates:
    - name: mediaservices-namespaced-tests-workflow
      inputs:
        parameters:
          - name: target_namespace
            value: "{{workflow.parameters.target_namespace}}"
      dag:
        tasks:
        - name: create-compartment
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_compartment}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/identity/v1alpha1/compartment.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}}"
        - name: create-mediaworkflow
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/mediaservices/v1alpha1/mediaworkflow.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-mediaworkflowjob
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-mediaworkflow]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/mediaservices/v1alpha1/mediaworkflowjob.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-mediaworkflow
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-mediaworkflow", "delete-mediaworkflowjob"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-mediaworkflow.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-mediaworkflow.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-mediaworkflow.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-mediaworkflowjob
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-mediaworkflowjob"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-mediaworkflowjob.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-mediaworkflowjob.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-mediaworkflowjob.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
