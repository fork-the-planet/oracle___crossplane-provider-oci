
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: oci-containerengine-namespaced-v1alpha1-tests-template
spec:
  serviceAccountName: argo-workflow
  entrypoint: containerengine-namespaced-tests-workflow
  volumes:
    - name: git-repo
      persistentVolumeClaim:
        claimName: git-repo-pvc
  arguments:
    parameters:
    - name: target_namespace
    - name: availability_domain
    - name: compartment_ocid
    - name: image_instance_ocid
    - name: create_compartment
      value: "true"
    - name: create_image
      value: "true"
    - name: create_subnet
      value: "true"
    - name: create_vcn
      value: "true"
    - name: create_resources
      value: "true"
    - name: delete_resources
      value: "true"
  templates:
    - name: containerengine-namespaced-tests-workflow
      inputs:
        parameters:
          - name: target_namespace
            value: "{{workflow.parameters.target_namespace}}"
      dag:
        tasks:
        - name: create-compartment
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_compartment}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/identity/v1alpha1/compartment.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}}"
        - name: create-image
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_image}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/image.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "IMAGE_INSTANCE_OCID={{workflow.parameters.image_instance_ocid}}"
        - name: create-subnet
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_subnet}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/subnet.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-vcn
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_vcn}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/vcn.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-cluster
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-subnet, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/containerengine/v1alpha1/cluster.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-privateendpointcluster
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-subnet, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/containerengine/v1alpha1/privateendpointcluster.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-nodepool
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-cluster, create-compartment, create-image, create-subnet]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/containerengine/v1alpha1/nodepool.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "AVAILABILITY_DOMAIN={{workflow.parameters.availability_domain}}"
        - name: delete-cluster
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-cluster", "delete-nodepool"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-cluster.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-cluster.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-cluster.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-privateendpointcluster
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-privateendpointcluster"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-privateendpointcluster.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-privateendpointcluster.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-privateendpointcluster.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-nodepool
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-nodepool"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-nodepool.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-nodepool.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-nodepool.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
