
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: oci-compute-namespaced-v1alpha1-tests-template
spec:
  serviceAccountName: argo-workflow
  entrypoint: compute-namespaced-tests-workflow
  volumes:
    - name: git-repo
      persistentVolumeClaim:
        claimName: git-repo-pvc
  arguments:
    parameters:
    - name: target_namespace
    - name: availability_domain
    - name: compartment_ocid
    - name: computehost_id
    - name: image_instance_ocid
    - name: instanceconsoleconnection_publickey
    - name: instancemaintenanceevent_id
    - name: create_compartment
      value: "true"
    - name: create_subnet
      value: "true"
    - name: create_vcn
      value: "true"
    - name: create_resources
      value: "true"
    - name: delete_resources
      value: "true"
  templates:
    - name: compute-namespaced-tests-workflow
      inputs:
        parameters:
          - name: target_namespace
            value: "{{workflow.parameters.target_namespace}}"
      dag:
        tasks:
        - name: create-compartment
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_compartment}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/identity/v1alpha1/compartment.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}}"
        - name: create-subnet
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_subnet}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/subnet.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-vcn
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_vcn}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/vcn.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-computecapacityreport
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/computecapacityreport.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "AVAILABILITY_DOMAIN={{workflow.parameters.availability_domain}}"
        - name: create-computehost
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/computehost.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPUTEHOST_ID={{workflow.parameters.computehost_id}}"
        - name: create-computehostgroup
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/computehostgroup.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "AVAILABILITY_DOMAIN={{workflow.parameters.availability_domain}}"
        - name: create-image
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/image.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "IMAGE_INSTANCE_OCID={{workflow.parameters.image_instance_ocid}}"
        - name: create-instance
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-image, create-subnet]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/instance.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "AVAILABILITY_DOMAIN={{workflow.parameters.availability_domain}}"
        - name: create-instanceconfiguration
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-image]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/instanceconfiguration.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "AVAILABILITY_DOMAIN={{workflow.parameters.availability_domain}}"
        - name: create-autoscaleinstanceconfiguration
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-image]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/autoscaleinstanceconfiguration.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}}"
        - name: create-instanceconsoleconnection
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-instance]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/instanceconsoleconnection.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "INSTANCECONSOLECONNECTION_PUBLICKEY={{workflow.parameters.instanceconsoleconnection_publickey}}"
        - name: create-instancemaintenanceevent
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/instancemaintenanceevent.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "INSTANCEMAINTENANCEEVENT_ID={{workflow.parameters.instancemaintenanceevent_id}}"
        - name: create-instancepool
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-instanceconfiguration, create-subnet]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/instancepool.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "AVAILABILITY_DOMAIN={{workflow.parameters.availability_domain}}"
        - name: create-autoscaleinstancepool
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-autoscaleinstanceconfiguration, create-subnet]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/autoscaleinstancepool.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "AVAILABILITY_DOMAIN={{workflow.parameters.availability_domain}}"
        - name: delete-computecapacityreport
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-computecapacityreport"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-computecapacityreport.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-computecapacityreport.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-computecapacityreport.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-computehost
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-computehost"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-computehost.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-computehost.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-computehost.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-computehostgroup
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-computehostgroup"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-computehostgroup.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-computehostgroup.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-computehostgroup.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-image
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-image", "delete-autoscaleinstanceconfiguration", "delete-instance", "delete-instanceconfiguration"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-image.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-image.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-image.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-instance
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-instance", "delete-instanceconsoleconnection"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-instance.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-instance.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-instance.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-instanceconfiguration
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-instanceconfiguration", "delete-instancepool"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-instanceconfiguration.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-instanceconfiguration.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-instanceconfiguration.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-autoscaleinstanceconfiguration
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-autoscaleinstanceconfiguration", "delete-autoscaleinstancepool"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-autoscaleinstanceconfiguration.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-autoscaleinstanceconfiguration.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-autoscaleinstanceconfiguration.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-instanceconsoleconnection
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-instanceconsoleconnection"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-instanceconsoleconnection.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-instanceconsoleconnection.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-instanceconsoleconnection.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-instancemaintenanceevent
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-instancemaintenanceevent"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-instancemaintenanceevent.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-instancemaintenanceevent.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-instancemaintenanceevent.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-instancepool
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-instancepool"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-instancepool.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-instancepool.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-instancepool.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-autoscaleinstancepool
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-autoscaleinstancepool"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-autoscaleinstancepool.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-autoscaleinstancepool.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-autoscaleinstancepool.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
