
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: oci-networking-namespaced-v1alpha1-tests-template
spec:
  serviceAccountName: argo-workflow
  entrypoint: networking-namespaced-tests-workflow
  volumes:
    - name: git-repo
      persistentVolumeClaim:
        claimName: git-repo-pvc
  arguments:
    parameters:
    - name: target_namespace
    - name: availability_domain
    - name: compartment_ocid
    - name: image_instance_ocid
    - name: create_compartment
      value: "true"
    - name: create_image
      value: "true"
    - name: create_instance
      value: "true"
    - name: create_resources
      value: "true"
    - name: delete_resources
      value: "true"
  templates:
    - name: networking-namespaced-tests-workflow
      inputs:
        parameters:
          - name: target_namespace
            value: "{{workflow.parameters.target_namespace}}"
      dag:
        tasks:
        - name: create-compartment
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_compartment}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/identity/v1alpha1/compartment.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}}"
        - name: create-image
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_image}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/image.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "IMAGE_INSTANCE_OCID={{workflow.parameters.image_instance_ocid}}"
        - name: create-instance
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_instance}} == true"
          dependencies: [create-compartment, create-image, create-subnet]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/compute/v1alpha1/instance.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "AVAILABILITY_DOMAIN={{workflow.parameters.availability_domain}}"
        - name: create-dhcpoptions
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/dhcpoptions.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-internetgateway
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/internetgateway.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-natgateway
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/natgateway.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-networksecuritygroup
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/networksecuritygroup.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-networksecuritygroupsecurityrule
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-networksecuritygroup]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/networksecuritygroupsecurityrule.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-publicippool
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/publicippool.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-routetable
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-natgateway, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/routetable.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-securitylist
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/securitylist.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-subnet
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/subnet.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-privatesubnet
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-vcn]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/privatesubnet.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-vcn
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/vcn.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-vnicattachment
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-instance]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/networking/v1alpha1/vnicattachment.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-dhcpoptions
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-dhcpoptions"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-dhcpoptions.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-dhcpoptions.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-dhcpoptions.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-internetgateway
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-internetgateway"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-internetgateway.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-internetgateway.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-internetgateway.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-natgateway
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-natgateway", "delete-routetable"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-natgateway.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-natgateway.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-natgateway.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-networksecuritygroup
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-networksecuritygroup", "delete-networksecuritygroupsecurityrule"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-networksecuritygroup.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-networksecuritygroup.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-networksecuritygroup.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-networksecuritygroupsecurityrule
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-networksecuritygroupsecurityrule"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-networksecuritygroupsecurityrule.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-networksecuritygroupsecurityrule.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-networksecuritygroupsecurityrule.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-publicippool
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-publicippool"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-publicippool.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-publicippool.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-publicippool.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-routetable
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-routetable"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-routetable.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-routetable.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-routetable.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-securitylist
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-securitylist"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-securitylist.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-securitylist.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-securitylist.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-subnet
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-subnet"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-subnet.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-subnet.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-subnet.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-privatesubnet
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-privatesubnet"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-privatesubnet.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-privatesubnet.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-privatesubnet.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-vcn
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-vcn", "delete-dhcpoptions", "delete-internetgateway", "delete-natgateway", "delete-networksecuritygroup", "delete-privatesubnet", "delete-routetable", "delete-securitylist", "delete-subnet"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-vcn.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-vcn.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-vcn.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-vnicattachment
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-vnicattachment"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-vnicattachment.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-vnicattachment.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-vnicattachment.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
