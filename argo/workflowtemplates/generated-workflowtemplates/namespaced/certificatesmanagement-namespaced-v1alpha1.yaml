
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: oci-certificatesmanagement-namespaced-v1alpha1-tests-template
spec:
  serviceAccountName: argo-workflow
  entrypoint: certificatesmanagement-namespaced-tests-workflow
  volumes:
    - name: git-repo
      persistentVolumeClaim:
        claimName: git-repo-pvc
  arguments:
    parameters:
    - name: target_namespace
    - name: compartment_ocid
    - name: vault_management_endpoint
    - name: create_compartment
      value: "true"
    - name: create_key
      value: "true"
    - name: create_resources
      value: "true"
    - name: delete_resources
      value: "true"
  templates:
    - name: certificatesmanagement-namespaced-tests-workflow
      inputs:
        parameters:
          - name: target_namespace
            value: "{{workflow.parameters.target_namespace}}"
      dag:
        tasks:
        - name: create-compartment
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_compartment}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/identity/v1alpha1/compartment.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}}"
        - name: create-asymmetrickey
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_key}} == true"
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/kms/v1alpha1/asymmetrickey.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
              - name: envVars
                value: "COMPARTMENT_OCID={{workflow.parameters.compartment_ocid}},VAULT_MANAGEMENT_ENDPOINT={{workflow.parameters.vault_management_endpoint}}"
        - name: create-cabundle
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/certificatesmanagement/v1alpha1/cabundle.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-certificate
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-certificateauthority, create-compartment]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/certificatesmanagement/v1alpha1/certificate.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: create-certificateauthority
          templateRef:
            name: test-template
            template: create-resource
          when: "{{workflow.parameters.create_resources}} == true"
          dependencies: [create-compartment, create-asymmetrickey]
          arguments:
            parameters:
              - name: resourceFile
                value: "examples/namespaced/certificatesmanagement/v1alpha1/certificateauthority.yaml"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-cabundle
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-cabundle"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-cabundle.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-cabundle.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-cabundle.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-certificate
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-certificate"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-certificate.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-certificate.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-certificate.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
        - name: delete-certificateauthority
          templateRef:
            name: test-template
            template: delete-resource
          when: "{{workflow.parameters.delete_resources}} == true"
          dependencies: ["create-certificateauthority", "delete-certificate"]
          arguments:
            parameters:
              - name: resourceKind
                value: "{{tasks.create-certificateauthority.outputs.parameters.resourceKind}}"
              - name: resourceName
                value: "{{tasks.create-certificateauthority.outputs.parameters.resourceName}}"
              - name: resourceGroup
                value: "{{tasks.create-certificateauthority.outputs.parameters.resourceGroup}}"
              - name: namespace
                value: "{{inputs.parameters.target_namespace}}"
