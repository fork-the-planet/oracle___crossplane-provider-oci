apiVersion: containerengine.oci.m.upbound.io/v1alpha1
kind: NodePool
metadata:
  name: nodepool1
  labels:
    testing.upbound.io/example-name: nodepool_label_1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    clusterIdSelector:
      matchLabels:
        testing.upbound.io/example-name: cluster_label_1

    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1

    name: nodepool1
    kubernetesVersion: v1.35.2
    nodeShape: VM.Standard.E4.Flex
    nodeMetadata:
      areLegacyImdsEndpointsDisabled: "true"

    nodeShapeConfig:
      - ocpus: 1
        memoryInGbs: 16

    nodeSourceDetails:
      - imageIdSelector:
          matchLabels:
            testing.upbound.io/example-name: image_label_1
        sourceType: IMAGE

    # Ensure the selected subnet has a route table with internet gateway access
    # and a security list that allows the required traffic.
    nodeConfigDetails:
      - size: 1
        placementConfigs:
          - availabilityDomain: ${AVAILABILITY_DOMAIN}
            subnetIdSelector:
              matchLabels:
                testing.upbound.io/example-name: subnet_label_1
        nodePoolPodNetworkOptionDetails:
          - cniType: OCI_VCN_IP_NATIVE
    secondaryVnics:
      - createVnicDetails:
          - subnetIdSelector:
              matchLabels:
                testing.upbound.io/example-name: subnet_label_1
            displayName: nodepoolsecondaryvnic1
            ipCount: 2
        displayName: nodepoolsecondaryvnic1
        nicIndex: 1

  providerConfigRef:
    name: default
    kind: ProviderConfig
