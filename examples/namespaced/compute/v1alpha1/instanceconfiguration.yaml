apiVersion: compute.oci.m.upbound.io/v1alpha1
kind: InstanceConfiguration
metadata:
  labels:
    testing.upbound.io/example-name: instanceconfiguration_label_1
  name: instanceconfiguration1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    displayName: instanceconfiguration1
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    instanceDetails:
      - instanceType: compute
        launchDetails:
          - availabilityDomain: ${AVAILABILITY_DOMAIN}
            compartmentIdSelector:
              matchLabels:
                testing.upbound.io/example-name: compartment_label_1
            displayName: instancepool-test-node
            instanceOptions:
              - areLegacyImdsEndpointsDisabled: true
            shape: VM.Standard.E4.Flex
            shapeConfig:
              - ocpus: 1
                memoryInGbs: 16
            sourceDetails:
              - sourceType: IMAGE
                imageIdSelector:
                  matchLabels:
                    testing.upbound.io/example-name: image_label_1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
