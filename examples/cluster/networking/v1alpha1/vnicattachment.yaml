apiVersion: networking.oci.upbound.io/v1alpha1
kind: VnicAttachment
metadata:
  labels:
    testing.upbound.io/example-name: vnicattachment_label_1
  name: vnicattachment1
spec:
  forProvider:
    createVnicDetails:
      - assignPublicIp: "false"
        displayName: vnicattachment1
        subnetIdSelector:
          matchLabels:
            testing.upbound.io/example-name: subnet_label_2
    displayName: vnicattachment1
    instanceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: instance_label_1
