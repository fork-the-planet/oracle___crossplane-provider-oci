name: Publish Provider Packages

on:
  workflow_dispatch:
    inputs:
      subpackages:
        description: 'Subpackages to be built individually (e.g. config,containerengine or "all" for all services)'
        default: 'all'
        required: true

      version:
        description: "Version string to use while publishing the packages (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      platform:
        type: choice
        description: "Platform string to use while building and publishing the packages (e.g. linux_amd64 linux_arm64)"
        default: linux_amd64 linux_arm64
        options:
        - linux_amd64 linux_arm64
        - linux_amd64
        - linux_arm64
        required: true
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.25'
        required: false
      size:
        description: "Number of smaller provider packages to build and push with each build job"
        default: '10'
        required: true
      concurrency:
        description: "Number of provider packages to process concurrently within each build job"
        default: '2'
        required: true
      cleanup-disk:
        type: boolean
        description: "Whether to clean runner disk space before publishing"
        default: true
        required: false

permissions:
  contents: read

env:
  # Common versions
  DOCKER_BUILDX_VERSION: 'v0.20.1'
  UP_VERSION: 'v0.37.1'

  # Registry/Org names
  CROSSPLANE_REGORG: 'ghcr.io/${{ github.repository_owner }}' # xpkg.crossplane.io/crossplane-contrib
jobs:
  index:
    runs-on: ubuntu-latest
    outputs:
      indices: ${{ steps.calc.outputs.indices }}
      subpackages: ${{ steps.calc.outputs.subpackages }}
      has_services: ${{ steps.calc.outputs.has_services }}
    steps:
      - name: Validate workflow inputs
        env:
          INPUT_SUBPACKAGES: ${{ inputs.subpackages }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_SIZE: ${{ inputs.size }}
          INPUT_CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          set -euo pipefail

          if [[ ! "$INPUT_SUBPACKAGES" =~ ^(all|[a-z0-9]+([,-][a-z0-9]+)*)$ ]]; then
            echo "Invalid subpackages input: $INPUT_SUBPACKAGES" >&2
            exit 1
          fi

          if [[ -n "$INPUT_VERSION" && ! "$INPUT_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version input: $INPUT_VERSION" >&2
            exit 1
          fi

          if [[ ! "$INPUT_SIZE" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid size input: $INPUT_SIZE" >&2
            exit 1
          fi

          if [[ ! "$INPUT_CONCURRENCY" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid concurrency input: $INPUT_CONCURRENCY" >&2
            exit 1
          fi

          case "$INPUT_PLATFORM" in
            "linux_amd64 linux_arm64"|"linux_amd64"|"linux_arm64")
              ;;
            *)
              echo "Invalid platform input: $INPUT_PLATFORM" >&2
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4

      - id: calc
        env:
          INPUT_SUBPACKAGES: ${{ inputs.subpackages }}
          INPUT_SIZE: ${{ inputs.size }}
        run: |
          set -euo pipefail

          if [ "$INPUT_SUBPACKAGES" = "all" ]; then
            SERVICES_LIST=$(find examples-generated/cluster -mindepth 1 -maxdepth 1 -type d 2>/dev/null | xargs -n1 basename | tr '\n' ',' | sed 's/,$//' || echo "")
            SUBPACKAGES="$SERVICES_LIST"
          else
            SUBPACKAGES=$(python3 - <<'PY'
          import os

          subpackages = [
              pkg
              for pkg in os.environ["INPUT_SUBPACKAGES"].split(",")
              if pkg and pkg != "config"
          ]
          print(",".join(subpackages))
          PY
          )
          fi
          export SUBPACKAGES
          INDICES=$(python3 - <<'PY'
          import math
          import os

          subpackages = [pkg for pkg in os.environ["SUBPACKAGES"].split(",") if pkg]
          size = int(os.environ["INPUT_SIZE"])
          print(list(range(0, math.ceil(len(subpackages) / size))))
          PY
          )
          echo "indices=$INDICES" >> "$GITHUB_OUTPUT"
          echo "subpackages=$SUBPACKAGES" >> "$GITHUB_OUTPUT"
          if [ -n "$SUBPACKAGES" ]; then
            echo "has_services=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_services=false" >> "$GITHUB_OUTPUT"
          fi

  publish-family:
    needs: index
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Cleanup Disk
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        if: ${{ inputs.cleanup-disk }}
        with:
          android: true
          dotnet: true
          haskell: true
          tool-cache: true
          large-packages: false
          swap-storage: false

      - name: Setup QEMU
        uses: docker/setup-qemu-action@2b82ce82d56a2a04d2637cd93a637ae1b359c0a7 # v2
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Login to GHCR using PAT
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4
        with:
          submodules: true

      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Vendor Dependencies
        run: make vendor vendor.check

      - name: Determine Version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version=$(make -s build.vars | sed -n 's/^VERSION=//p')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check Generated Diff
        run: make check-diff

      - name: Publish Family Provider
        env:
          INPUT_VERSION: ${{ steps.version.outputs.version }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_CONCURRENCY: ${{ inputs.concurrency }}
          REGISTRY_ORG: ${{ env.CROSSPLANE_REGORG }}
          # We're using docker buildx, which doesn't actually load the images it
          # builds by default. Specifying --load does so.
          BUILD_ARGS: "--load"
        run: |
          set -euo pipefail

          batch_platforms=$(tr ' ' ',' <<<"$INPUT_PLATFORM")
          df -h
          make \
            CONCURRENCY="$INPUT_CONCURRENCY" \
            SUBPACKAGES_FOR_BATCH="config" \
            XPKG_REG_ORGS="$REGISTRY_ORG" \
            VERSION="$INPUT_VERSION" \
            SKIP_GO_CACHE_CLEAN=true \
            BATCH_PLATFORMS="$batch_platforms" \
            publish-subpackages

  publish-services:
    if: ${{ needs.index.outputs.has_services == 'true' }}
    strategy:
      matrix:
        index: ${{ fromJSON(needs.index.outputs.indices) }}

    needs:
      - index
      - publish-family
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Cleanup Disk
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        if: ${{ inputs.cleanup-disk }}
        with:
          android: true
          dotnet: true
          haskell: true
          tool-cache: true
          large-packages: false
          swap-storage: false

      - name: Setup QEMU
        uses: docker/setup-qemu-action@2b82ce82d56a2a04d2637cd93a637ae1b359c0a7 # v2
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Login to GHCR using PAT
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4
        with:
          submodules: true

      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Vendor Dependencies
        run: make vendor vendor.check

      - name: Calculate packages to build & push
        id: packages
        env:
          ALL_PACKAGES: ${{ needs.index.outputs.subpackages }}
          MATRIX_INDEX: ${{ matrix.index }}
          INPUT_SIZE: ${{ inputs.size }}
        run: |
          set -euo pipefail

          PACKAGES_BATCH=$(python3 - <<'PY'
          import os

          all_packages = [pkg for pkg in os.environ["ALL_PACKAGES"].split(",") if pkg]
          size = int(os.environ["INPUT_SIZE"])
          start_idx = int(os.environ["MATRIX_INDEX"]) * size
          batch = all_packages[start_idx:start_idx + size]
          if "config" in batch:
              raise SystemExit("service batch must not include config")
          print(",".join(batch))
          PY
          )
          echo "packages_batch=$PACKAGES_BATCH" >> "$GITHUB_OUTPUT"

      - name: Pull Family Provider
        id: family
        env:
          INPUT_PLATFORM: ${{ inputs.platform }}
          REGISTRY_ORG: ${{ env.CROSSPLANE_REGORG }}
          VERSION: ${{ needs.publish-family.outputs.version }}
        run: |
          set -euo pipefail

          family_base_image="$REGISTRY_ORG/provider-family-oci:$VERSION"
          family_manifest=$(docker buildx imagetools inspect "$family_base_image")
          printf '%s\n' "$family_manifest"
          for platform in $INPUT_PLATFORM; do
            os="${platform%%_*}"
            arch="${platform##*_}"
            family_arch_image="$family_base_image-$arch"
            printf '%s\n' "$family_manifest" | grep -E "^[[:space:]]*Platform:[[:space:]]+$os/$arch$"
            docker pull --platform "$os/$arch" "$family_base_image"
            docker tag "$family_base_image" "$family_arch_image"
            docker image inspect "$family_arch_image"
          done
          echo "family_base_image=$family_base_image" >> "$GITHUB_OUTPUT"

      - name: Publish Service Artifacts
        env:
          PACKAGES_BATCH: ${{ steps.packages.outputs.packages_batch }}
          INPUT_VERSION: ${{ needs.publish-family.outputs.version }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_CONCURRENCY: ${{ inputs.concurrency }}
          REGISTRY_ORG: ${{ env.CROSSPLANE_REGORG }}
          FAMILY_BASE_IMAGE: ${{ steps.family.outputs.family_base_image }}
          # We're using docker buildx, which doesn't actually load the images it
          # builds by default. Specifying --load does so.
          BUILD_ARGS: "--load"
        run: |
          set -euo pipefail

          batch_platforms=$(tr ' ' ',' <<<"$INPUT_PLATFORM")
          df -h
          make \
            CONCURRENCY="$INPUT_CONCURRENCY" \
            SUBPACKAGES_FOR_BATCH="$PACKAGES_BATCH" \
            FAMILY_BASE_IMAGE="$FAMILY_BASE_IMAGE" \
            XPKG_REG_ORGS="$REGISTRY_ORG" \
            VERSION="$INPUT_VERSION" \
            BATCH_PLATFORMS="$batch_platforms" \
            publish-service-subpackages
