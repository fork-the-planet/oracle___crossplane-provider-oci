name: Publish Provider Packages

on:
  workflow_dispatch:
    inputs:
      subpackages:
        description: 'Subpackages to be built individually (e.g. config,containerengine or "all" for all services)'
        default: 'all'
        required: true

      version:
        description: "Version string to use while publishing the packages (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      platform:
        type: choice
        description: "Platform string to use while building and publishing the packages (e.g. linux_amd64 linux_arm64)"
        default: linux_amd64 linux_arm64
        options:
        - linux_amd64 linux_arm64
        - linux_amd64
        - linux_arm64
        required: true
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.25'
        required: false
      size:
        description: "Number of smaller provider packages to build and push with each build job"
        default: '10'
        required: true

permissions:
  contents: read

env:
  # Common versions
  DOCKER_BUILDX_VERSION: 'v0.20.1'
  UP_VERSION: 'v0.37.1'

  # Registry/Org names
  CROSSPLANE_REGORG: 'ghcr.io/${{ github.repository_owner }}' # xpkg.crossplane.io/crossplane-contrib
jobs:
  index:
    runs-on: ubuntu-latest
    outputs:
      indices: ${{ steps.calc.outputs.indices }}
      subpackages: ${{ steps.calc.outputs.subpackages }}
    steps:
      - name: Validate workflow inputs
        env:
          INPUT_SUBPACKAGES: ${{ inputs.subpackages }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_SIZE: ${{ inputs.size }}
        run: |
          set -euo pipefail

          if [[ ! "$INPUT_SUBPACKAGES" =~ ^(all|[a-z0-9]+([,-][a-z0-9]+)*)$ ]]; then
            echo "Invalid subpackages input: $INPUT_SUBPACKAGES" >&2
            exit 1
          fi

          if [[ -n "$INPUT_VERSION" && ! "$INPUT_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version input: $INPUT_VERSION" >&2
            exit 1
          fi

          if [[ ! "$INPUT_SIZE" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid size input: $INPUT_SIZE" >&2
            exit 1
          fi

          case "$INPUT_PLATFORM" in
            "linux_amd64 linux_arm64"|"linux_amd64"|"linux_arm64")
              ;;
            *)
              echo "Invalid platform input: $INPUT_PLATFORM" >&2
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4

      - id: calc
        env:
          INPUT_SUBPACKAGES: ${{ inputs.subpackages }}
          INPUT_SIZE: ${{ inputs.size }}
        run: |
          set -euo pipefail

          if [ "$INPUT_SUBPACKAGES" = "all" ]; then
            SERVICES_LIST=$(find examples-generated/cluster -mindepth 1 -maxdepth 1 -type d 2>/dev/null | xargs -n1 basename | tr '\n' ',' | sed 's/,$//' || echo "")
            if [ -n "$SERVICES_LIST" ]; then
              SUBPACKAGES="config,$SERVICES_LIST"
            else
              SUBPACKAGES="config"
            fi
          else
            SUBPACKAGES="$INPUT_SUBPACKAGES"
          fi
          export SUBPACKAGES
          INDICES=$(python3 - <<'PY'
          import math
          import os

          subpackages = [pkg for pkg in os.environ["SUBPACKAGES"].split(",") if pkg]
          size = int(os.environ["INPUT_SIZE"])
          print(list(range(0, math.ceil(len(subpackages) / size))))
          PY
          )
          echo "indices=$INDICES" >> "$GITHUB_OUTPUT"
          echo "subpackages=$SUBPACKAGES" >> "$GITHUB_OUTPUT"

  publish-artifacts:
    strategy:
      max-parallel: 4
      matrix:
        index: ${{ fromJSON(needs.index.outputs.indices) }}

    needs: index
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          set -euo pipefail
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Setup QEMU
        uses: docker/setup-qemu-action@2b82ce82d56a2a04d2637cd93a637ae1b359c0a7 # v2
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Login to GHCR using PAT
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4
        with:
          submodules: true

      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Setup Go
        uses: actions/setup-go@6edd4406fa81c3da01a34fa6f6343087c207a568 # v3
        with:
          go-version: ${{ inputs.go-version }}

      - name: Find the Go Build Cache
        id: go_cache
        run: |
          echo "cache=$(make go.cachedir)" >> $GITHUB_OUTPUT && \
          echo "mod_cache=$(make go.mod.cachedir)" >> $GITHUB_OUTPUT

      - name: Cache the Go Build Cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ${{ steps.go_cache.outputs.cache }}
          key: ${{ runner.os }}-build-publish-artifacts-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-build-publish-artifacts-

      - name: Cache Go Dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ${{ steps.go_cache.outputs.mod_cache }}
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-pkg-

      - name: Vendor Dependencies
        run: make vendor vendor.check

      - name: Calculate packages to build & push
        id: packages
        env:
          ALL_PACKAGES: ${{ needs.index.outputs.subpackages }}
          MATRIX_INDEX: ${{ matrix.index }}
          INPUT_SIZE: ${{ inputs.size }}
        run: |
          set -euo pipefail

          PACKAGES_BATCH=$(python3 - <<'PY'
          import os

          all_packages = [pkg for pkg in os.environ["ALL_PACKAGES"].split(",") if pkg]
          size = int(os.environ["INPUT_SIZE"])
          start_idx = int(os.environ["MATRIX_INDEX"]) * size
          batch = all_packages[start_idx:start_idx + size]
          if "config" not in batch:
              batch = ["config"] + batch
          print(",".join(batch))
          PY
          )
          echo "packages_batch=$PACKAGES_BATCH" >> "$GITHUB_OUTPUT"

      - name: Generate Artifacts
        id: generate_artifacts
        env:
          PACKAGES_BATCH: ${{ steps.packages.outputs.packages_batch }}
        run: |
          set -euo pipefail
          echo "Generating artifacts for: $PACKAGES_BATCH"
          go install golang.org/x/tools/cmd/goimports@latest
          make generate
          df -h

      - name: Publish Artifacts
        env:
          PACKAGES_BATCH: ${{ steps.packages.outputs.packages_batch }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          REGISTRY_ORG: ${{ env.CROSSPLANE_REGORG }}
          # We're using docker buildx, which doesn't actually load the images it
          # builds by default. Specifying --load does so.
          BUILD_ARGS: "--load"
        run: |
          set -euo pipefail

          batch_platforms=$(tr ' ' ',' <<<"$INPUT_PLATFORM")
          df -h
          make \
            CONCURRENCY=5 \
            SUBPACKAGES_FOR_BATCH="$PACKAGES_BATCH" \
            XPKG_REG_ORGS="$REGISTRY_ORG" \
            VERSION="$INPUT_VERSION" \
            BATCH_PLATFORMS="$batch_platforms" \
            publish-subpackages
